# =========================================================================
# AAMAPP — Docker Compose untuk PRODUKSI
# File: deploy/docker-compose.prod.yml
# =========================================================================
# PERHATIAN:
#   - File ini adalah compose PRODUKSI — terpisah dari docker-compose.yml (dev)
#   - SEMUA kredensial WAJIB dari env (tidak ada default tertanam)
#   - Port DB TIDAK diekspos ke host
#   - Healthcheck aktif untuk ketiga service
#   - Volume bernama eksplisit (prefix aamapp_prod_)
#
# Cara pakai (dari root proyek):
#   # Validasi konfigurasi (tanpa menjalankan):
#   docker compose -f deploy/docker-compose.prod.yml config
#
#   # Jalankan (butuh .env dengan nilai produksi):
#   docker compose -f deploy/docker-compose.prod.yml up -d --build
#
#   # Lihat log:
#   docker compose -f deploy/docker-compose.prod.yml logs -f
#
#   # Hentikan:
#   docker compose -f deploy/docker-compose.prod.yml down
# =========================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - aamapp_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # TIDAK ada port mapping — DB hanya diakses internal via jaringan compose

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - SESSION_IDLE_MINUTES=${SESSION_IDLE_MINUTES:-60}
      - SESSION_ABSOLUTE_HOURS=${SESSION_ABSOLUTE_HOURS:-24}
      - UPLOAD_ROOT=/data/uploads
      - TZ=${TZ:-Asia/Jakarta}
      - NODE_ENV=production
    volumes:
      - aamapp_prod_uploads:/data/uploads
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:3000/api/auth/config || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    # TIDAK ada port mapping — backend hanya diakses via nginx frontend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=/api
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  aamapp_prod_db_data:
  aamapp_prod_uploads:

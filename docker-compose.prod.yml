# docker-compose.prod.yml — Stack produksi AAMAPP
#
# Cara pakai:
#   1. Salin .env.example → .env dan isi semua nilai (terutama *_PASSWORD, SECRET, DOMAIN)
#   2. docker compose -f docker-compose.prod.yml up -d
#
# TIDAK ada port DB yang dipublikasikan ke luar (keamanan).
# Frontend di-serve via nginx di port WEB_PORT (default 80).
# HTTPS/TLS: pasang reverse-proxy (Caddy/nginx/Traefik) di depan.

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ:                ${TZ:-Asia/Jakarta}
    volumes:
      - db_data:/var/lib/postgresql/data
    # Tidak ada ports: — DB tidak boleh diakses dari luar container network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:             production
      DB_HOST:              db
      POSTGRES_DB:          ${POSTGRES_DB}
      POSTGRES_USER:        ${POSTGRES_USER}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD}
      TZ:                   ${TZ:-Asia/Jakarta}
      UPLOAD_ROOT:          /data/uploads
      ALLOWED_ORIGINS:      ${ALLOWED_ORIGINS}
      ADMIN_NAME:           ${ADMIN_NAME}
      ADMIN_EMAIL:          ${ADMIN_EMAIL}
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-60}
      SESSION_ABSOLUTE_HOURS: ${SESSION_ABSOLUTE_HOURS:-24}
      SEED_TA_NAMA:         ${SEED_TA_NAMA:-}
      SEED_TA_SEMESTER:     ${SEED_TA_SEMESTER:-}
    volumes:
      - uploads_data:/data/uploads
    # Tidak ada ports: — hanya diakses via frontend nginx proxy
    # (nginx config di frontend/nginx.conf mem-proxy /api ke backend:3000)

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_API_BASE pakai relative path (/api) — nginx handles proxy.
        # TIDAK hardcode localhost ataupun domain di sini.
        VITE_API_BASE: /api
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
